<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CulinaryPortal - How-to Cook</title>
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #ff6b81;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --card-bg: #fff;
            --radius: 12px;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.2);
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box button {
            padding: 12px 25px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background-color: #ff2d3d;
        }

        .categories {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 35px;
        }

        .cat-btn {
            padding: 8px 18px;
            background-color: white;
            border: 2px solid #e1e1e1;
            border-radius: 20px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .cat-btn:hover, .cat-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #eee;
        }

        .thumbnail-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }

        .watch-btn {
            text-align: center;
            padding: 8px;
            background-color: #f1f2f6;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }

        .watch-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .load-more-container {
            text-align: center;
            margin-top: 40px;
        }

        .btn-load {
            padding: 12px 30px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-load:hover {
            background-color: #555;
        }

        .loading, .error-msg, .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #666;
        }

        .error-msg {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>CulinaryPortal - How-to Cook</h1>
        <p>Khám phá công thức nấu ăn, đồ uống và mẹo làm bếp đỉnh cao từ YouTube</p>
    </header>

    <div class="container">
        <!-- Khung tìm kiếm -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Nhập tên món ăn hoặc đồ uống bạn muốn tìm...">
            <button id="searchBtn">Tìm kiếm</button>
        </div>

        <!-- Các nút phân loại danh mục đúng chuẩn trực quan -->
        <div class="categories" id="categoryContainer">
            <button class="cat-btn active" data-query="công thức nấu ăn">Tất cả</button>
            <button class="cat-btn" data-query="món ăn gia đình">Món Ăn Gia Đình</button>
            <button class="cat-btn" data-query="đồ ăn nhanh">Đồ Ăn Nhanh</button>
            <button class="cat-btn" data-query="đồ ăn vặt">Đồ Ăn Vặt</button>
            <button class="cat-btn" data-query="đồ uống trà cà phê">Đồ Uống (Trà, Cà phê...)</button>
            <button class="cat-btn" data-query="món canh súp nóng">Món Canh / Súp Nóng</button>
        </div>

        <!-- Lưới hiển thị danh sách video -->
        <div class="video-grid" id="videoGrid"></div>

        <!-- Nút xem thêm -->
        <div class="load-more-container">
            <button id="loadMoreBtn" class="btn-load" style="display: none;">Xem Thêm</button>
        </div>
    </div>

    <script>
        let state = {
            currentQuery: "công thức nấu ăn",
            nextPageToken: ""
        };

        const DOM = {
            searchBox: document.getElementById('searchInput'),
            searchBtn: document.getElementById('searchBtn'),
            videoGrid: document.getElementById('videoGrid'),
            loadMoreBtn: document.getElementById('loadMoreBtn'),
            categories: document.querySelectorAll('.cat-btn')
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetchVideos(false);

            DOM.searchBtn.addEventListener('click', () => {
                const keyword = DOM.searchBox.value.trim();
                if (keyword) {
                    DOM.categories.forEach(b => b.classList.remove('active'));
                    state.currentQuery = keyword;
                    fetchVideos(false);
                }
            });

            DOM.searchBox.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    DOM.searchBtn.click();
                }
            });

            DOM.categories.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    DOM.categories.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    state.currentQuery = e.target.getAttribute('data-query');
                    DOM.searchBox.value = ""; 
                    fetchVideos(false);
                });
            });

            DOM.loadMoreBtn.addEventListener('click', () => {
                if (state.nextPageToken) {
                    fetchVideos(true);
                }
            });
        });

        async function fetchVideos(isLoadMore = false) {
            const API_KEY = "DIỆN_MÃ_API_KEY_CỦA_BẠN_VÀO_ĐÂY"; 
            const MAX_RESULTS = 16;

            if (!isLoadMore) {
                DOM.videoGrid.innerHTML = '<div class="loading">Đang tải danh sách video...</div>';
                DOM.loadMoreBtn.style.display = 'none';
            }

            let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=${MAX_RESULTS}&q=${encodeURIComponent(state.currentQuery)}&key=${API_KEY}`;
            
            if (isLoadMore && state.nextPageToken) {
                url += `&pageToken=${state.nextPageToken}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                state.nextPageToken = data.nextPageToken || "";

                if (!isLoadMore) {
                    DOM.videoGrid.innerHTML = '';
                }

                if (!data.items || data.items.length === 0) {
                    if (!isLoadMore) {
                        DOM.videoGrid.innerHTML = '<div class="no-result">Không tìm thấy video nào phù hợp!</div>';
                    }
                    DOM.loadMoreBtn.style.display = 'none';
                    return;
                }

                renderVideos(data.items, isLoadMore);
                DOM.loadMoreBtn.style.display = state.nextPageToken ? 'inline-block' : 'none';

            } catch (error) {
                console.error("Lỗi khi gọi API YouTube:", error);
                if (!isLoadMore) {
                    DOM.videoGrid.innerHTML = `<div class="error-msg">Lỗi tải dữ liệu: ${error.message}. Vui lòng kiểm tra lại API Key!</div>`;
                }
            }
        }

        function renderVideos(items, isAppend) {
            let htmlContent = '';
            items.forEach(item => {
                const videoId = item.id.videoId;
                const title = item.snippet.title;
                const channelTitle = item.snippet.channelTitle;
                const thumbnail = item.snippet.thumbnails.medium.url;
                const watchUrl = `https://www.youtube.com/watch?v=${videoId}`;

                htmlContent += `
                    <div class="video-card">
                        <div class="thumbnail-container">
                            <img src="${thumbnail}" alt="${title}" loading="lazy">
                        </div>
                        <div class="video-info">
                            <div>
                                <h3 class="video-title" title="${title}">${title}</h3>
                                <p class="video-channel">${channelTitle}</p>
                            </div>
                            <a href="${watchUrl}" target="_blank" class="watch-btn">Xem Hướng Dẫn</a>
                        </div>
                    </div>
                `;
            });

            if (isAppend) {
                DOM.videoGrid.insertAdjacentHTML('beforeend', htmlContent);
            } else {
                DOM.videoGrid.innerHTML = htmlContent;
            }
        }
    </script>
</body>
</html>
